name: OCI A1 Launcher

on:
  workflow_dispatch:
    inputs:
      force_restart:
        description: 'ステートをリセットして最初からやり直す場合は true を入力'
        required: false
        default: 'false'

permissions:
  actions: write   # gh workflow run で次セッションを起動するために必要
  contents: read

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5時間55分（GitHub Actions上限6時間より少し短く）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install oci

      # ─────────────────────────────────────────
      # ステートの復元（前回セッションの続きから再開）
      # ─────────────────────────────────────────
      - name: ステートキャッシュを復元
        if: github.event.inputs.force_restart != 'true'
        uses: actions/cache/restore@v4
        with:
          path: /tmp/oci_launcher_state.json
          key: oci-launcher-state-${{ github.repository }}-latest
          restore-keys: |
            oci-launcher-state-${{ github.repository }}-

      - name: ステートをリセット
        if: github.event.inputs.force_restart == 'true'
        run: |
          rm -f /tmp/oci_launcher_state.json
          echo "ステートをリセットしました。最初からやり直します。"

      # ─────────────────────────────────────────
      # PEM書き出し（Python経由で確実に改行を正規化）
      # ─────────────────────────────────────────
      - name: PEM鍵ファイルを書き出す
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: python write_pem.py

      # ─────────────────────────────────────────
      # 診断: 設定値の確認（値はマスク、形式のみ検証）
      # ─────────────────────────────────────────
      - name: 設定診断（形式チェック）
        env:
          OCI_USER_OCID:           ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID:        ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT:         ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION:              ${{ secrets.OCI_REGION }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_OCID:         ${{ secrets.OCI_SUBNET_OCID }}
          OCI_IMAGE_OCID:          ${{ secrets.OCI_IMAGE_OCID }}
        run: python diagnose.py

      - name: ステート確認（作成済みならスキップ）
        id: check-state
        run: python check_state.py

      # ─────────────────────────────────────────
      # メインスクリプト実行
      # ─────────────────────────────────────────
      - name: OCI A1 インスタンス作成スクリプトを実行
        id: run-launcher
        if: steps.check-state.outputs.instance_created != 'true'
        env:
          OCI_USER_OCID:            ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID:         ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT:          ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY:          ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION:               ${{ secrets.OCI_REGION }}
          OCI_AVAILABILITY_DOMAIN:  ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_OCID:          ${{ secrets.OCI_SUBNET_OCID }}
          OCI_IMAGE_OCID:           ${{ secrets.OCI_IMAGE_OCID }}
          NOTIFICATION_EMAIL:       ${{ secrets.NOTIFICATION_EMAIL }}
          SMTP_HOST:                ${{ secrets.SMTP_HOST }}
          SMTP_PORT:                ${{ secrets.SMTP_PORT }}
          SMTP_USER:                ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:            ${{ secrets.SMTP_PASSWORD }}
          INSTANCE_NAME:            ${{ secrets.INSTANCE_NAME }}
          OCPU_COUNT:               ${{ secrets.OCPU_COUNT }}
          MEMORY_GB:                ${{ secrets.MEMORY_GB }}
          BOOT_VOLUME_GB:           ${{ secrets.BOOT_VOLUME_GB }}
          SSH_PUBLIC_KEY:           ${{ secrets.SSH_PUBLIC_KEY }}
        run: python oci_a1_launcher.py

      # ─────────────────────────────────────────
      # ステートの保存（常に実行）
      # ─────────────────────────────────────────
      - name: ステートキャッシュを保存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/oci_launcher_state.json
          key: oci-launcher-state-${{ github.repository }}-latest

      # ─────────────────────────────────────────
      # 次セッション起動（作成未完了かつ正常終了の場合のみ）
      # ─────────────────────────────────────────
      - name: 次のセッションを起動
        if: >
          steps.run-launcher.outcome == 'success' &&
          steps.check-state.outputs.instance_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "次のセッションを起動します..."
          gh workflow run oci_a1_launcher.yml \
            --ref ${{ github.ref_name }}
          echo "次セッション起動完了"

      # ─────────────────────────────────────────
      # 実行サマリー
      # ─────────────────────────────────────────
      - name: 実行結果サマリー
        if: always()
        run: |
          echo "## OCI A1 Launcher 実行結果" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/oci_launcher_state.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat /tmp/oci_launcher_state.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "ステートファイルなし" >> $GITHUB_STEP_SUMMARY
          fi
